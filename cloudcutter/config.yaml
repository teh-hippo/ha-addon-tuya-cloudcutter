name: Tuya Cloudcutter
version: "0.3.2"
slug: tuya_cloudcutter
description: HAOS wrapper for tuya-cloudcutter. Cut Tuya devices from the cloud or flash custom firmware over-the-air. Upstream-native, no convenience layer.
arch:
  - aarch64
url: https://github.com/teh-hippo/ha-addon-tuya-cloudcutter
init: false
startup: application
boot: manual
host_network: true
host_dbus: true
apparmor: false
privileged:
  - NET_ADMIN
  - NET_RAW
  - SYS_ADMIN
# /dev/rfkill needed inside container for setup_apmode.sh's `rfkill unblock wifi`.
# If this still gives "Operation not permitted" on some kernels, escalate to
# `udev: true` (alongside, not instead) — or drop `:rwm` if Supervisor rejects.
devices:
  - /dev/rfkill:rwm
map:
  - share:rw
ingress: true
ingress_port: 7681
panel_icon: mdi:content-cut
options:
  ssh_authorized_keys: []
  ssh_port: 22251
schema:
  ssh_authorized_keys:
    - str
  ssh_port: port
